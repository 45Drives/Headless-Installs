# --- GLOBAL SETTINGS ---
cmdline
reboot
lang en_US.UTF-8
keyboard us
timezone America/New_York --utc
rootpw --iscrypted $6$pAzKGjUDjrB.xYXL$AtpXHI/jZlKkSHzK0gohKcSB6VtUzGRGQ9r.y2PMVyC3rmPddjDtO3juTVuhx6awd/62Q93rRmFqAnabUtgTp0
firstboot --enable

# --- SOFTWARE SELECTION ---
%packages
@^minimal-environment
@base
@core
%end

# --- REPOS ---
url --url="https://dl.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/"
repo --name="AppStream" --baseurl="https://dl.rockylinux.org/pub/rocky/9/AppStream/x86_64/os/"

%include /tmp/disk-config

# -------------------------------------------------
# PRE-INSTALL: Dynamic Disk Selection
# -------------------------------------------------
%pre --interpreter=/bin/bash
touch /tmp/disk-config
REAL_DISKS=$(lsblk -dno NAME,TYPE | awk '$2=="disk"{print $1}' | sort)
D1=$(echo "$REAL_DISKS" | sed -n '1p')
D2=$(echo "$REAL_DISKS" | sed -n '2p')

# -------------------------------------------------
# Ceph Safety Check (ABORT if Ceph metadata detected)
# -------------------------------------------------

check_ceph() {
    DISK=$1

    echo "Checking /dev/$DISK for Ceph metadata..."

    # Check for Ceph LVM volumes referencing this disk
    if pvs --noheadings -o pv_name,vg_name 2>/dev/null | grep "/dev/$DISK" | grep -qi ceph; then
        echo "ERROR: Ceph LVM metadata detected on /dev/$DISK"
        exit 1
    fi

    # Check partition signatures
    for part in $(lsblk -ln /dev/$DISK -o NAME | tail -n +2); do
        if blkid /dev/$part 2>/dev/null | grep -qi ceph; then
            echo "ERROR: Ceph filesystem signature detected on /dev/$part"
            exit 1
        fi
    done

    # Check device mapper for ceph volumes
    if lsblk -n | grep -E "ceph--" | grep -q "$DISK"; then
        echo "ERROR: Ceph device-mapper volume associated with /dev/$DISK"
        exit 1
    fi
}

check_ceph "$D1"
check_ceph "$D2"

echo "No Ceph metadata detected on install disks."

cat <<EOF > /tmp/disk-config
network --bootproto=dhcp --onboot=yes --activate --hostname=cephnode

ignoredisk --only-use=$D1,$D2
clearpart --all --initlabel --drives=$D1,$D2

# Disk partitioning information
part raid.622 --fstype="mdmember" --ondisk=$D2 --size=30736 --grow 
part raid.615 --fstype="mdmember" --ondisk=$D1 --size=30736 --grow
part raid.244 --fstype="mdmember" --ondisk=$D2 --size=1025
part raid.237 --fstype="mdmember" --ondisk=$D1 --size=1025
raid /boot/efi --device=boot_efi --fstype="efi" --level=RAID1 --fsoptions="umask=0077,shortname=winnt" raid.237 raid.244
raid / --device=root --fstype="xfs" --level=RAID1 raid.615 raid.622

EOF
%end


# -------------------------------------------------
# POST-INSTALL: Sync EFI + Install GRUB
# -------------------------------------------------
%post --log=/root/kickstart-post.log --interpreter=/bin/bash
cat >/etc/yum.repos.d/45drives-enterprise.repo <<EOF
[45drives_enterprise]
enabled = 1
priority = 1
gpgcheck = 1
repo_gpgcheck = 1
baseurl = https://repo.45drives.com/enterprise/rocky/el9/stable
gpgkey = https://repo.45drives.com/key/gpg.asc
name = 45Drives Enterprise $releasever Repo

[45drives_enterprise_testing]
enabled = 0
priority = 1
gpgcheck = 1
repo_gpgcheck = 1
baseurl = https://repo.45drives.com/enterprise/rocky/el9/testing
gpgkey = https://repo.45drives.com/key/gpg.asc
name = 45Drives Enterprise $releasever Testing Repo
EOF

cat >/etc/yum.repos.d/ceph-stable.repo <<EOF
[ceph_stable]
baseurl = http://download.ceph.com/rpm-squid/el9/x86_64
gpgcheck = 1
gpgkey = https://download.ceph.com/keys/release.asc
name = Ceph Stable \$basearch repo
priority = 2

[ceph_stable_noarch]
baseurl = http://download.ceph.com/rpm-squid/el9/noarch
gpgcheck = 1
gpgkey = https://download.ceph.com/keys/release.asc
name = Ceph Stable noarch repo
priority = 2
EOF

dnf install -y epel-release
dnf install -y 45drives-tools
setenforce 0
sed -i 's/^\(SELINUX=\).*$/\1permissive/' /etc/selinux/config
dnf -y install dnf-plugins-core
crb enable
dnf install -y cephadm podman cockpit cockpit-bridge cockpit-benchmark cockpit-navigator cockpit-file-sharing cockpit-45drives-hardware cockpit-identities cockpit-storaged cockpit-scheduler nano tuned
firewall-cmd --add-service=cockpit --permanent
firewall-cmd --reload
systemctl enable --now cockpit.socket
sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
cephadm pull
dnf update -y --nobest

%end
